# =============================================================================
# Execora — Distribution Compose (ThemeForest / end-user install)
# Usage:  docker compose -f docker-compose.dist.yml up -d
#
# Services:
#   web      — React frontend (nginx, port 80 or APP_PORT)
#   app      — Fastify API (internal port 3006)
#   worker   — BullMQ job processor
#   postgres — PostgreSQL 15
#   redis    — Redis 7
#   minio    — S3-compatible storage
#
# Dev admin UIs (pgAdmin, Adminer, Redis Commander) are intentionally excluded.
# =============================================================================
name: execora

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: execora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: execora
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-execora}
      POSTGRES_DB: execora
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U execora"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    networks:
      - execora-network

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: execora-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 5s
    networks:
      - execora-network

  # ── MinIO ───────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: execora-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-execora}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-execora123}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - execora-network

  minio-init:
    image: minio/mc:latest
    container_name: execora-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-execora} ${MINIO_ROOT_PASSWORD:-execora123} &&
        mc mb --ignore-existing local/execora &&
        echo 'MinIO bucket ready.'
      "
    networks:
      - execora-network

  # ── API Server ──────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: execora-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://execora:${POSTGRES_PASSWORD:-execora}@postgres:5432/execora?schema=public
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      PORT: "3006"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3006/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    volumes:
      - ./logs:/app/apps/api/logs
    networks:
      - execora-network

  # ── Worker ──────────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: execora-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://execora:${POSTGRES_PASSWORD:-execora}@postgres:5432/execora?schema=public
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - execora-network

  # ── Web Frontend (nginx) ────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: execora-web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - execora-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  execora-network:
    driver: bridge
    name: execora-network
