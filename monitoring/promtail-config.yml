server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: execora-app
    static_configs:
      - targets:
          - localhost
        labels:
          job: execora-app
          environment: production
          service: execora-api
          __path__: /app/logs/app.log

    pipeline_stages:
      # 1. Parse JSON log line into extracted map
      - json:
          expressions:
            level: level
            timestamp: time
            message: msg
            tenantId: tenantId
            category: category
            action: action
            model: model
            durationMs: durationMs

      # 2. Map pino numeric level → human-readable string
      #    Pino levels: 10=trace 20=debug 30=info 40=warn 50=error 60=fatal
      - template:
          source: level
          template: '{{ if eq .Value "10" }}trace{{ else if eq .Value "20" }}debug{{ else if eq .Value "30" }}info{{ else if eq .Value "40" }}warn{{ else if eq .Value "50" }}error{{ else if eq .Value "60" }}fatal{{ else }}{{ .Value }}{{ end }}'

      # 3. Promote fields to Loki stream labels (keep cardinality low)
      - labels:
          level:
          tenantId:
          category:
          model:
          action:

      # 4. Parse timestamp from the JSON "time" field (milliseconds epoch)
      - timestamp:
          source: timestamp
          format: UnixMs
