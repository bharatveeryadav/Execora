# =============================================================================
# Execora — Production override for docker-compose.yml
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# What this file does:
#   1. Removes dev-only tools (pgAdmin, Adminer, Redis Commander)
#   2. Adds memory + CPU resource limits to prevent runaway containers
#   3. Enables PostgreSQL connection limits and hardened settings
#   4. Configures Redis with a password (set REDIS_PASSWORD in .env)
#   5. Locks MinIO credentials to env vars (not hardcoded defaults)
#
# Prerequisites:
#   - Copy .env.example to .env and fill in all required values
#   - ADMIN_API_KEY must be set (min 32 chars)
#   - JWT_SECRET must be set (min 32 chars)
#   - POSTGRES_PASSWORD should be a strong random value
#   - REDIS_PASSWORD should be a strong random value
#   - MINIO_ROOT_USER / MINIO_ROOT_PASSWORD must be changed from defaults
# =============================================================================

services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in production}
    # Production: increase max connections, enable logging
    command: >
      postgres
      -c max_connections=100
      -c shared_buffers=256MB
      -c log_min_duration_statement=1000
      -c log_connections=on
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  redis:
    # Require password in production — set REDIS_PASSWORD in .env
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required in production}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  minio:
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required in production}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required in production}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  minio-init:
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing local/execora &&
        echo 'MinIO bucket execora ready.'
      "

  app:
    # Pass Redis password through to app
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
      # Restart policy: restart immediately on failure, limit retries
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  worker:
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ── Remove all dev tools in production ─────────────────────────────────────
  pgadmin:
    deploy:
      replicas: 0   # disabled

  adminer:
    deploy:
      replicas: 0   # disabled

  redis-commander:
    deploy:
      replicas: 0   # disabled
